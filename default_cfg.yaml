seed: 42
run_name: orbit_wars_ppo
device: auto
save_dir: artifacts
checkpoint_every: 100
log_every: 1
opponent: self
self_play_update_interval: 50
self_play_deterministic: false
alternate_player_sides: true
env:
  candidate_count: 8
  ship_bucket_count: 8
model:
  hidden_size: 128
  num_heads: 4
  num_attn_layers: 1
  mlp_ratio: 2.0
  dropout: 0.0
ppo:
  rollout_steps: 64
  num_envs: 8
  total_updates: 5000
  epochs: 4
  minibatch_size: 512
  gamma: 0.99
  clip_coef: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  lr: 0.0002
  max_grad_norm: 0.5
